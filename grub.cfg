## =============================================================================
## GraphiOS Atom Beta 1 — GRUB Bootloader Configuration (grub.cfg)
##
## This file is placed at /boot/grub/grub.cfg inside the ISO image.
## GRUB reads it at boot time to build the menu and load the kernel.
## =============================================================================

## Show the boot menu for 5 seconds, then autoboot entry 0
set timeout=5
set default=0

## Optional: enable GRUB's graphical terminal (comment out for serial-only)
## terminal_output gfxterm

menuentry "GraphiOS Atom Beta 1  [x86_64]" {
    ## Announce this kernel uses the Multiboot2 protocol
    multiboot2 /boot/graphios_atom.elf

    ## Transfer control to the kernel
    boot
}

menuentry "GraphiOS Atom Beta 1  [Serial / Debug]" {
    multiboot2 /boot/graphios_atom.elf
    boot
}
